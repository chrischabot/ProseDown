name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web — typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Unit tests
        working-directory: web
        run: npm test -- --run

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  rust-check:
    name: Rust — cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build web (required by tauri-build)
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Cargo check
        run: cargo check -p prosedown --locked

      - name: Cargo fmt
        run: cargo fmt --all -- --check

  macos-build:
    name: macOS — tauri build
    runs-on: macos-14
    needs: [web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install cargo-tauri
        run: cargo install tauri-cli --version '^2'
      - name: Install
        run: npm --prefix web ci
      - name: Build
        run: cargo tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: prosedown-macos
          path: src-tauri/target/release/bundle/
          if-no-files-found: warn