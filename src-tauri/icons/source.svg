<?xml version="1.0" encoding="UTF-8"?>
<!-- ProseDown app icon.  1024×1024, full-bleed so macOS applies its own
     squircle mask.  Pure shapes — no font dependencies so rasterizers
     (cargo tauri icon → rsvg) produce identical output on any machine. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4f46e5"/>
      <stop offset="55%"  stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <filter id="docShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="40" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- soft diagonal highlight -->
  <path d="M0 0 L1024 0 L1024 520 Z" fill="#ffffff" opacity="0.06"/>

  <!-- document card -->
  <g filter="url(#docShadow)">
    <rect x="208" y="168" width="608" height="720" rx="56" ry="56" fill="#ffffff"/>
  </g>

  <!-- Hash glyph — drawn as four strokes so we don't depend on a system
       font being present at rasterisation time. -->
  <g stroke="#2563eb" stroke-width="30" stroke-linecap="round">
    <!-- two vertical strokes (sheared slightly like a typographic #) -->
    <line x1="298" y1="288" x2="282" y2="380"/>
    <line x1="364" y1="288" x2="348" y2="380"/>
    <!-- two horizontal strokes -->
    <line x1="258" y1="314" x2="388" y2="314"/>
    <line x1="252" y1="354" x2="382" y2="354"/>
  </g>

  <!-- Heading bar (the H1 text) -->
  <rect x="428" y="298" width="320" height="60" rx="14" fill="#111827"/>

  <!-- Body text lines -->
  <rect x="258" y="452" width="508" height="26" rx="8"  fill="#cbd2de"/>
  <rect x="258" y="510" width="420" height="26" rx="8"  fill="#cbd2de"/>
  <rect x="258" y="568" width="478" height="26" rx="8"  fill="#cbd2de"/>

  <!-- Code block -->
  <rect x="258" y="650" width="508" height="170" rx="22"
        fill="#f3f4f6" stroke="#e5e7eb" stroke-width="2"/>
  <rect x="294" y="696" width="200" height="20" rx="6" fill="#60a5fa"/>
  <rect x="508" y="696" width="136" height="20" rx="6" fill="#94a3b8"/>
  <rect x="294" y="738" width="290" height="20" rx="6" fill="#64748b"/>
  <rect x="294" y="780" width="240" height="20" rx="6" fill="#94a3b8"/>
</svg>
