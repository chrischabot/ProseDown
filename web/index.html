<!doctype html>
<html lang="en" class="markview-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   img-src 'self' data: blob:;
                   style-src 'self' 'unsafe-inline';
                   script-src 'self' 'wasm-unsafe-eval' blob:;
                   worker-src 'self' blob:;
                   child-src 'self' blob:;
                   connect-src 'self';
                   font-src 'self' data:;
                   frame-src 'none';
                   object-src 'none';
                   base-uri 'self';" />
    <title>Markview</title>
    <link rel="stylesheet" href="/src/styles/tailwind.css" />
    <link rel="stylesheet" href="/src/styles/prose-macos.css" />
    <link rel="stylesheet" href="/src/styles/chrome.css" />
  </head>
  <body class="markview-body">
    <div class="mv-drag-region" data-tauri-drag-region aria-hidden="true"></div>
    <main id="doc"
          class="markview-doc prose prose-slate dark:prose-invert mx-auto px-10 py-10"
          tabindex="-1"
          style="--markview-zoom: 1;">
      <div id="markview-loading" class="opacity-50 text-sm select-none">Loading…</div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
